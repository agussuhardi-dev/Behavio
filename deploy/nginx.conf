server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # DNS internal Docker Compose
    resolver 127.0.0.11 valid=10s ipv6=off;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # 8080 = server.port backend (application.yml). Sebelumnya 8081 dan tak pernah
    # cocok, sehingga SELURUH Admin API mustahil dijangkau lewat nginx.
    location /api/ {
        set $backend "http://backend:8080";
        proxy_pass         $backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Live View memakai SSE (design.md §10) — stream yang sengaja tak pernah selesai.
    # Dengan buffering default nginx menahan event sampai buffer penuh, jadi dashboard
    # tampak "diam" padahal request mengalir. Butuh blok sendiri karena `proxy_pass`
    # di atas juga cocok dengan path ini.
    location ~ ^/api/admin/v1/[^/]+/simulators/[^/]+/logs/stream$ {
        set $backend_sse "http://backend:8080";
        proxy_pass          $backend_sse;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    Connection        "";
        proxy_http_version  1.1;
        proxy_buffering     off;
        chunked_transfer_encoding off;
        proxy_read_timeout  24h;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|woff|woff2|ttf|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
