server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # Sejak backend memakai network_mode: host, ia TIDAK lagi ada di jaringan bridge —
    # nama service `backend` tak bisa di-resolve lagi. Dan JANGAN pakai 127.0.0.1:
    # loopback di sini menunjuk container nginx sendiri, bukan host. `host.docker.internal`
    # dipetakan ke gateway host lewat extra_hosts di docker-compose.yml.
    #
    # 9000 = server.port backend (application.yml). Sebelumnya 8080; port simulator
        # merapat di atasnya (9001+). Kalau diubah, ubah juga .env SERVER_PORT.
        # Dulu pernah 8081 dan tak pernah
    # cocok, sehingga SELURUH Admin API mustahil dijangkau lewat nginx.
    location /api/ {
        # TANPA variabel — ini penting. `proxy_pass $var` membuat nginx me-resolve saat
        # request lewat direktif `resolver` (DNS Docker), yang TIDAK membaca /etc/hosts,
        # sehingga host.docker.internal gagal ("recv() failed while resolving"). Bentuk
        # literal di-resolve sekali saat startup lewat /etc/hosts — dan entri itu statis
        # (extra_hosts), jadi nginx tetap start walau backend sedang mati.
        # JANGAN tambahkan garis miring di ujung: itu akan memotong prefiks /api/.
        proxy_pass         http://host.docker.internal:9000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Live View memakai SSE (design.md §10) — stream yang sengaja tak pernah selesai.
    # Dengan buffering default nginx menahan event sampai buffer penuh, jadi dashboard
    # tampak "diam" padahal request mengalir. Butuh blok sendiri karena `proxy_pass`
    # di atas juga cocok dengan path ini.
    location ~ ^/api/admin/v1/[^/]+/simulators/[^/]+/logs/stream$ {
        proxy_pass          http://host.docker.internal:9000;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    Connection        "";
        proxy_http_version  1.1;
        proxy_buffering     off;
        chunked_transfer_encoding off;
        proxy_read_timeout  24h;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|woff|woff2|ttf|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
