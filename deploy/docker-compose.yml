services:
  backend:
    image: behavio-backend:latest
    container_name: behavio-backend
    restart: unless-stopped
    env_file: .env
    # ── network_mode: host (keputusan 2026-07-22) ──────────────────────────
    # Tiap simulator membuka portnya SENDIRI saat RUNTIME (bank 9001+, QRIS 9101+,
    # ISO-8583 9201+) lewat platform.port_registry. Pemetaan port Docker sebaliknya
    # bersifat STATIS — ditetapkan saat container dibuat. Ketidakcocokan itulah akar
    # masalah `Connection refused` walau simulator hidup: port di luar rentang yang
    # terlanjur dipetakan tak pernah dipublikasikan.
    #
    # Host networking menghapus kelas masalah itu: port apa pun yang dibuka aplikasi
    # langsung terjangkau, tanpa SIM_PORT_START/END yang harus dirawat dan tanpa
    # recreate container tiap menambah blok port produk baru. Bonus: mempublikasikan
    # ratusan port lewat bridge itu mahal (proses per-port bila userland proxy aktif).
    #
    # HARGANYA — disadari saat memutuskan: container ikut melihat seluruh interface
    # host (isolasi jaringan hilang) dan bersaing langsung memperebutkan port host.
    # Konsekuensi lain: `backend` tak lagi ada di jaringan bridge, sehingga nginx
    # TIDAK bisa memanggilnya lewat nama service — lihat deploy/nginx.conf.
    network_mode: host
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${SERVER_PORT:-9000}/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  frontend:
    image: behavio-frontend:latest
    container_name: behavio-frontend
    restart: unless-stopped
    ports:
      - "81:80"
    # Frontend SENGAJA tetap di bridge: memindahkannya ke host juga akan mengubah port
    # yang diekspos (81) dan menyentuh konfigurasi tunnel cloudflared yang hidup di luar
    # repo ini. Agar tetap bisa menjangkau backend yang kini host-mode, nginx memakai
    # nama `host.docker.internal` yang dipetakan ke gateway host di bawah ini.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  cloudflared:
     image: cloudflare/cloudflared:latest
     container_name: behavio-cloudflared
     restart: unless-stopped
     command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
     depends_on:
       - frontend
     logging:
       driver: json-file
       options:
         max-size: "5m"
         max-file: "3"
