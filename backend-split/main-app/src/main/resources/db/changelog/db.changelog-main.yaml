databaseChangeLog:
  # Master changelog main-app: merakit schema semua module. platform dulu (port_registry
  # milik main-app), lalu bank (module simulator) & qris (module qris) — file changelog-nya
  # ikut di jar module masing-masing, tersedia di classpath karena main-app depend keduanya.
  # Path & isi changeset IDENTIK dengan backend/ lama → checksum cocok, tak re-run.
  - include:
      file: db/changelog/platform/001-platform.sql
  - include:
      file: db/changelog/bank/001-bank.sql
  - include:
      file: db/changelog/qris/001-qris.sql
  - include:
      file: db/changelog/bank/002-drop-unused.sql
  - include:
      file: db/changelog/qris/002-drop-unused.sql
  - include:
      file: db/changelog/bank/003-webhook-subscriptions.sql
  - include:
      file: db/changelog/qris/003-webhook-subscriptions.sql
  # Produk ISO-8583 (docs/iso8583-plan.md) — changelog di jar module :iso8583.
  - include:
      file: db/changelog/iso8583/001-iso8583.sql
  - include:
      file: db/changelog/iso8583/002-state.sql
  - include:
      file: db/changelog/iso8583/003-scenarios.sql
  - include:
      file: db/changelog/iso8583/004-reversal.sql
  - include:
      file: db/changelog/iso8583/005-pin-phone.sql
  - include:
      file: db/changelog/iso8583/006-log-error.sql
  - include:
      file: db/changelog/iso8583/007-log-processing-code.sql
